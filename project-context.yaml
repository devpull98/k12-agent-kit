# project-context.yaml — Khai báo per-project. Copy vào root project thật và điền thông tin.
# Framework load file này khi session bắt đầu (hook session-start).

# --- BẮT BUỘC ---
stack: spring   # Dev tự tạo rules/{stack}/ nếu chưa có — copy từ rules/_template/

# --- KHUYẾN NGHỊ ---
qc_stack: qc-playwright     # qc-playwright | cypress | selenium | postman
default_role: ""            # Dev | Tester | TechLead | "" (auto-detect)
test_runner: ""             # junit5 | phpunit | jest | vitest | pytest | go-test — để trống = suy từ stack

# --- TÙY CHỌN: Domain routing ---
domains:
  - lms
  - club
  - teacher
  - products

# --- TÙY CHỌN: Module → domain mapping (polyglot/monorepo — mở rộng sau) ---
# modules:
#   lms-api: { stack: spring, domain: lms }
#   k12-product-api: { stack: nodejs, domain: products }

# --- TÙY CHỌN: Infrastructure ---
# db: [mysql, mongodb, redis]
# messaging: [kafka, rabbitmq]

# --- TÙY CHỌN: Stack overrides cho governance scripts ---
# Bỏ comment và điền nếu stack không có trong danh sách built-in,
# hoặc project có cấu trúc thư mục không chuẩn.
# source_dirs: [src, app, internal]       # thư mục chứa code (validate-sdd-gate.sh)
# code_extensions: [java, kt, go, ts]     # extension file code (validate-trace.sh + sdd-gate)
# exclude_dirs: [generated, proto-gen]    # thư mục bổ sung cần loại khi grep trace

# --- Đường dẫn artifact (mặc định nếu không điền) ---
# Model: Work Package (1 task = 1 folder docs/work/<KEY>-<slug>/) + stable spec per module.
# Xem rules/_global/doc-scoping.mdc.
paths:
  work_dir: docs/work                 # execution: _context.md, plan.md, checklist.md, note.md, bugs.md
  module_specs: docs/specs/modules    # stable truth per module + _index.md
  bdd_specs: docs/specs/bdd           # UC-keyed, phẳng (script trace quét)
  tech_design: docs/specs/tech-design
  test_plans: docs/test-plans
  bug_reports: docs/work              # bugs.md trong work package (legacy: docs/bugs)
  progress_logs: docs/work            # note.md trong work package (legacy: docs/logs)
  principles: docs/principles.md
  trace_dir: docs/trace

# --- Governance (CI/local) ---
# governance:
#   sdd_gate: true
#   trace_gate: true
#   stack_gate: true
