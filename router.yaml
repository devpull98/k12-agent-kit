# Router: intent -> skill. Strict-first, fallback nếu không match.
routes:
  - intent: "navigate enterprise delivery theo canonical flow và track"
    keywords: [enterprise flow, canonical flow, track, standard track, fast track, hotfix track, workflow enterprise, quy trình enterprise, next step]
    skill: writing-plans
    not_for_skills: [brainstorming]
    confidence: strict

  - intent: "tìm hiểu codebase hoặc product trước khi làm việc"
    keywords: [product discovery, codebase, explore, onboarding, tìm hiểu, module, how does it work, architecture overview]
    skill: product-discovery
    not_for_skills: [brainstorming, debugging]
    confidence: strict

  - intent: "định nghĩa nguyên tắc vận hành dự án"
    keywords: [principles, governance, must, must not, engineering principles, policy]
    skill: spec-driven-development
    notes: "Dùng templates/principles-template.md — khác với Product Brief (scope/feature)"
    confidence: strict

  - intent: "viết Product Brief trước khi BDD"
    keywords: [product brief, scope, boundaries, feature spec, requirement doc, feature brief]
    skill: spec-driven-development
    not_for_skills: [bdd-specification]
    notes: "Dùng templates/spec-template.md — output là docs/specs/{date}-{feature}.md"
    confidence: strict

  - intent: "bước tiếp theo là gì, đang ở đâu trong flow"
