    skill: writing-plans
    confidence: strict

  - intent: "định nghĩa nguyên tắc vận hành dự án"
    keywords: [principles, governance, must, must not, engineering principles, policy]
    skill: spec-driven-development
    confidence: strict

  - intent: "viết spec trước khi code"
    keywords: [spec, requirement, acceptance criteria]
    skill: spec-driven-development
    confidence: strict

  - intent: "viết test trước implementation"
    keywords: [tdd, test, unit test, write test first]
    skill: tdd
    not_for_skills: [debugging]
    confidence: strict

  - intent: "sửa bug có sẵn"
    keywords: [fix, bug, lỗi, debug]
    skill: debugging
    not_for_skills: [tdd]
    confidence: strict

  - intent: "xử lý bug production theo hotfix track"
